name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ahlan
          POSTGRES_PASSWORD: ahlan
          POSTGRES_DB: ahlan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ahlan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: make docs-api-check
