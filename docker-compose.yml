services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ahlan
      POSTGRES_PASSWORD: ahlan
      POSTGRES_DB: ahlan
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahlan"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
