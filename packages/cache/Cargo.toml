[package]
name = "cache"
version = "0.1.0"
edition = "2024"

[dependencies]
redis = { version = "0.29", features = ["tokio-comp"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tracing = "0.1.44"
tokio = { version = "1.52.3", features = ["full"] }
thiserror = "2.0.18"

[dev-dependencies]
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }
